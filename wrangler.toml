# Cloudflare Workers 配置
name = "amazon-ai-image"
compatibility_date = "2024-01-01"

# 启用 Node.js 兼容模式
compatibility_flags = ["nodejs_compat"]

# 静态资源目录（构建后的 output 目录）
assets = { binding = "assets", directory = "output" }

[vars]
NEXT_PUBLIC_APP_URL = "https://amazon-ai-image.your-account.workers.dev"

# 路由规则（可选）
# routes = [
#   { pattern = "amazon-ai-image.your-account.workers.dev/*", zone_name = "your-domain.com" }
# ]
