# Cloudflare Pages 配置
# 使用 wrangler 部署时需要

name = "amazon-ai-image"
compatibility_date = "2024-01-01"
pages_build_output_dir = ".vercel/output/static"

# KV 命名空间（如果需要）
# [[kv_namespaces]]
# binding = "IMAGE_CACHE"
# id = "your-kv-namespace-id"

# R2 存储桶（图片存储）
# [[r2_buckets]]
# binding = "IMAGE_STORE"
# bucket_name = "amazon-ai-images"

# 环境变量（部署时在 Cloudflare Dashboard 设置）
# 必须在 Dashboard 配置以下环境变量：
# - NEXT_PUBLIC_SUPABASE_URL
# - NEXT_PUBLIC_SUPABASE_ANON_KEY
# - SUPABASE_SERVICE_ROLE_KEY
# - REMOVE_BG_API_KEY
# - CLIPDROP_API_KEY
# - CLOUDMERSIVE_API_KEY

[vars]
NEXT_PUBLIC_APP_URL = "https://your-domain.pages.dev"
