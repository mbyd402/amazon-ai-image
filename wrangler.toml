# Cloudflare Workers 配置
name = "amazon-ai-image"
compatibility_date = "2024-09-23"

# 启用 Node.js 兼容模式
compatibility_flags = ["nodejs_compat"]

# Worker 入口脚本
main = ".open-next/worker.js"

# 开启代码压缩
[build]
minify = true

[vars]
NEXT_PUBLIC_APP_URL = "https://amazon-ai-image.your-account.workers.dev"
