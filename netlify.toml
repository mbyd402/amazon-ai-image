[build]
  # 基本构建命令
  command = "npm run build"
  # 发布目录
  publish = ".next"
  
  # 🎯 禁用所有处理，直接使用Next.js输出
  processing.skip_processing = true
  
  # 禁用缓存以避免大缓存问题
  cache = false
  
  # 环境变量（可选，不会导致构建失败）
  environment = { 
    CLIPDROP_API_KEY = "optional", 
    CLOUDMERSIVE_API_KEY = "optional", 
    NEXT_PUBLIC_PAYPAL_CLIENT_ID = "optional", 
    NEXT_PUBLIC_SUPABASE_ANON_KEY = "optional", 
    NEXT_PUBLIC_SUPABASE_URL = "optional", 
    PAYPAL_CLIENT_SECRET = "optional", 
    REMOVE_BG_API_KEY = "optional", 
    SUPABASE_SERVICE_ROLE_KEY = "optional", 
    NODE_VERSION = "20.10.0" 
  }

# 🎯 重要：禁用所有插件，直接使用原生Next.js构建
# 不启用 @netlify/plugin-nextjs

[build.environment]
  # Node.js版本
  NODE_VERSION = "20.10.0"
  # 标记构建环境
  IS_BUILD_TIME = "true"
  NETLIFY_BUILD = "true"
  # 减少内存使用
  NODE_OPTIONS = "--max-old-space-size=3072"
  # 禁用 yarn
  NETLIFY_USE_YARN = "false"
  # 禁用 pnpm 缓存
  PNPM_STORE_DIR = "/tmp/pnpm-store"

# 重定向配置（简单版本）
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 缓存头配置
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"

# 🎯 关键：禁用所有Next.js相关的插件
# 注释掉或删除所有插件配置

# 禁用 Netlify 缓存
[cache]
  enabled = false